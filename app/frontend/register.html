<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join MovieSphere | Create Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#0f0f0f] py-12 flex items-center justify-center relative overflow-x-hidden">
    
    <div class="absolute top-[-10%] right-[-10%] w-[40%] h-[40%] bg-red-900/10 rounded-full blur-[120px]"></div>

    <div id="toast-container" class="fixed top-5 right-5 z-[1000]"></div>

    <div class="glass-card w-full max-w-2xl p-10 rounded-2xl relative z-10 mx-4">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-red-600 tracking-tighter">CREATE ACCOUNT</h1>
            <p class="text-gray-400 text-sm mt-2">Start your personalized cinematic journey today.</p>
        </div>

        <form id="registerForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Account Info -->
            <div class="space-y-4">
                <h3 class="text-white font-bold text-sm border-b border-gray-800 pb-2">Basic Information</h3>
                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Full Name</label>
                    <input type="text" id="regName" required class="w-full bg-black/40 border border-gray-800 rounded-lg py-2.5 px-4 outline-none focus:border-red-600 text-sm transition">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Email</label>
                    <input type="email" id="regEmail" required class="w-full bg-black/40 border border-gray-800 rounded-lg py-2.5 px-4 outline-none focus:border-red-600 text-sm transition">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Password</label>
                    <input type="password" id="regPassword" required class="w-full bg-black/40 border border-gray-800 rounded-lg py-2.5 px-4 outline-none focus:border-red-600 text-sm transition">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Confirm Password</label>
                    <input type="password" id="regConfirmPassword" required class="w-full bg-black/40 border border-gray-800 rounded-lg py-2.5 px-4 outline-none focus:border-red-600 text-sm transition">
                </div>
            </div>

            <!-- Genre Selection -->
            <div class="space-y-4">
                <h3 class="text-white font-bold text-sm border-b border-gray-800 pb-2">Your Interests</h3>
                <p class="text-[11px] text-gray-500 italic">Select at least 3 genres to tune our engine.</p>
                <div id="genreGrid" class="grid grid-cols-2 gap-2 max-h-[220px] overflow-y-auto pr-2">
                    <!-- Genres generated by JS -->
                </div>
            </div>

            <div class="md:col-span-2 pt-4">
                <button type="submit" id="registerBtn" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-xl transition-all transform active:scale-95">
                    Create My Account
                </button>
                <p class="text-center text-gray-400 text-sm mt-6">
                    Already a member? <a href="login.html" class="text-white font-bold hover:text-red-500 transition">Log In</a>
                </p>
            </div>
        </form>
    </div>

    <script src="assets/js/main.js"></script>
    <script src="assets/js/auth.js"></script>
</body>
</html>
